<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Вход — Голосовой диалог с ассистентами</title>
  <style>
    * { box-sizing: border-box; }
    body { font-family: system-ui, sans-serif; margin: 2rem; max-width: 360px; margin-left: auto; margin-right: auto; }
    h1 { font-size: 1.25rem; margin-bottom: 1.5rem; }
    label { display: block; margin-bottom: 0.25rem; }
    input[type=text], input[type=password] { width: 100%; padding: 0.5rem; margin-bottom: 1rem; }
    button { padding: 0.5rem 1rem; background: #2563eb; color: white; border: none; border-radius: 6px; cursor: pointer; }
    button:hover { background: #1d4ed8; }
    .error { color: #b91c1c; margin-bottom: 1rem; font-size: 0.9rem; }
  </style>
</head>
<body>
  <h1>Вход в портал</h1>
  {% if error %}<p class="error">{{ error }}</p>{% endif %}
  <form method="post" action="{{ url_for('login') }}">
    <label for="username">Логин</label>
    <input type="text" id="username" name="username" required autocomplete="username">
    <label for="password">Пароль</label>
    <input type="password" id="password" name="password" required autocomplete="current-password">
    <button type="submit">Войти</button>
  </form>
</body>
</html>
